version: 0.2
phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - npm install -g @angular/cli@17
  pre_build:
    commands:
      - npm install
  build:
    commands:
      - ng build -c production
      - echo "Build completed."
    finally:
      - echo This is the finally block execution!
  post_build:
    commands:
      - cp appspec.yml dist/my-angular-project/
      - cp -r deploy-scripts dist/my-angular-project/
artifacts:
  base-directory: 'dist/my-angular-project'
  files:
    - '**/*'